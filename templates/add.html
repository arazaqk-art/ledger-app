<!DOCTYPE html>
<html>
<head>
  <title>Add Entry</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">
  <div class="container py-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <div>
        <h3 class="mb-0">Add Ledger Entry</h3>
        <small class="text-muted">Fill details and click Save</small>
      </div>
      <a href="/dashboard" class="btn btn-outline-secondary">← Back</a>
    </div>

    <div class="card shadow-sm border-0">
      <div class="card-body p-4">
        <form method="post" action="/add" class="row g-3" id="entryForm">

          <!-- Customer -->
          <div class="col-md-6">
            <label class="form-label">Customer Name</label>
            <input class="form-control" name="customer_name" placeholder="e.g. Gul Baig" required>
          </div>

          <div class="col-md-6">
            <label class="form-label">Phone</label>
            <input class="form-control" name="phone" placeholder="+923001234567 or 03001234567" required>
            <div class="form-text">Pakistan format supported. System will auto convert 03xx → +92.</div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Vehicle No</label>
            <input class="form-control" name="vehicle_no" placeholder="e.g. TKR771">
          </div>

          <div class="col-md-6">
            <label class="form-label">Date</label>
            <input class="form-control" name="date" type="date" required>
          </div>

          <!-- Mine / Destination -->
          <div class="col-md-6">
            <label class="form-label">Coal Mine (Source)</label>
            <input class="form-control" name="source_mine" placeholder="e.g. Dukki Mine / Chamalang">
          </div>

          <div class="col-md-6">
            <label class="form-label">Destination</label>
            <input class="form-control" name="destination" placeholder="e.g. Lahore / Faisalabad / Plant name">
          </div>

          <!-- Address -->
          <div class="col-12">
            <label class="form-label">Address (optional)</label>
            <input class="form-control" name="address" placeholder="e.g. Site address / delivery notes">
          </div>

          <!-- Billing -->
          <div class="col-md-4">
            <label class="form-label">Unit</label>
            <input class="form-control" id="unit" name="unit" type="number" step="0.01" placeholder="e.g. 10" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Rate</label>
            <input class="form-control" id="rate" name="rate" type="number" step="0.01" placeholder="e.g. 5000" required>
          </div>

          <div class="col-md-4">
            <label class="form-label">Received</label>
            <input class="form-control" id="received" name="received" type="number" step="0.01" placeholder="e.g. 20000" required>
          </div>

          <!-- Live summary -->
          <div class="col-12">
            <div class="row g-3">
              <div class="col-md-4">
                <div class="p-3 rounded border bg-white">
                  <div class="text-muted small">Total</div>
                  <div class="fs-5 fw-bold" id="totalPreview">0.00</div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="p-3 rounded border bg-white">
                  <div class="text-muted small">Balance</div>
                  <div class="fs-5 fw-bold text-danger" id="balancePreview">0.00</div>
                </div>
              </div>
              <div class="col-md-4">
                <div class="p-3 rounded border bg-white">
                  <div class="text-muted small">Tip</div>
                  <div class="small">Balance > 0 → SMS reminder (if Twilio configured)</div>
                </div>
              </div>
            </div>
          </div>

          <!-- Buttons -->
          <div class="col-12 d-flex gap-2">
            <button class="btn btn-success px-4" type="submit">Save Entry</button>
            <a class="btn btn-outline-secondary" href="/dashboard">Cancel</a>
          </div>

        </form>
      </div>
    </div>
  </div>

  <script>
    function num(v){ const n=parseFloat(v); return isNaN(n)?0:n; }
    function updatePreview(){
      const unit=num(document.getElementById('unit').value);
      const rate=num(document.getElementById('rate').value);
      const rec=num(document.getElementById('received').value);
      const total=unit*rate;
      const bal=total-rec;
      document.getElementById('totalPreview').textContent = total.toFixed(2);
      document.getElementById('balancePreview').textContent = bal.toFixed(2);
      document.getElementById('balancePreview').className = bal>0 ? "fs-5 fw-bold text-danger" : "fs-5 fw-bold text-success";
    }
    ['unit','rate','received'].forEach(id=>{
      document.getElementById(id).addEventListener('input', updatePreview);
    });
    updatePreview();
  </script>
</body>
</html>
