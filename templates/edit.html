<!DOCTYPE html>
<html>
<head>
  <title>Edit Entry</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5 col-md-6">
    <div class="card p-4 shadow">
      <h4 class="mb-3">Edit Ledger Entry (#{{ entry.id }})</h4>

      <form method="post" action="/edit/{{ entry.id }}">
        <input class="form-control mb-2" name="customer_name" value="{{ entry.customer_name }}" required>

        <input class="form-control mb-2" name="phone"
               value="{{ entry.phone }}" required>

        <input class="form-control mb-2" name="address" value="{{ entry.address }}">
        <input class="form-control mb-2" name="vehicle_no" value="{{ entry.vehicle_no }}">

        <div class="row">
          <div class="col">
            <input class="form-control mb-2" name="unit" type="number" step="0.01" value="{{ entry.unit }}" required>
          </div>
          <div class="col">
            <input class="form-control mb-2" name="rate" type="number" step="0.01" value="{{ entry.rate }}" required>
          </div>
        </div>

        <input class="form-control mb-2" name="received" type="number" step="0.01" value="{{ entry.received }}" required>

        <input class="form-control mb-3" name="date" type="date" value="{{ entry.date }}" required>

        <button class="btn btn-primary w-100">Update</button>
      </form>

      <a href="/dashboard" class="btn btn-link mt-3">Back</a>
    </div>
  </div>
</body>
</html>
