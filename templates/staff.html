<!DOCTYPE html>
<html>
<head>
  <title>Staff Management</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
      <h3 class="mb-0">Staff Management</h3>
      <a class="btn btn-outline-primary" href="/dashboard">Back</a>
    </div>

    <div class="card p-3 shadow mb-3">
      <h5 class="mb-3">Create User</h5>
      <form method="post" action="/staff/create" class="row g-2">
        <div class="col-md-4">
          <input class="form-control" name="username" placeholder="username" required>
        </div>
        <div class="col-md-4">
          <input class="form-control" name="password" type="password" placeholder="password" required>
        </div>
        <div class="col-md-2">
          <select class="form-select" name="role">
            <option value="staff" selected>staff</option>
            <option value="admin">admin</option>
          </select>
        </div>
        <div class="col-md-2">
          <button class="btn btn-success w-100">Create</button>
        </div>
      </form>
      <div class="text-muted mt-2" style="font-size: 13px;">
        Note: Only admin can create users.
      </div>
    </div>

    <div class="card shadow">
      <div class="card-body">
        <table class="table table-bordered">
          <thead>
            <tr><th>ID</th><th>Username</th><th>Role</th></tr>
          </thead>
          <tbody>
            {% for u in users %}
            <tr>
              <td>{{ u.id }}</td>
              <td>{{ u.username }}</td>
              <td>{{ u.role }}</td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>

  </div>
</body>
</html>
